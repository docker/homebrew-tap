name: PR Validation

on:
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/pr-validation.yml"

permissions: {}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      formulas: ${{ steps.changed.outputs.formulas }}
      has_formula_changes: ${{ steps.changed.outputs.has_formula_changes }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get changes
        id: changed
        run: |
          # Detect changed formulas
          FORMULAS=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'Formula/*.rb' | xargs -I{} basename {} .rb)
          if [ -z "$FORMULAS" ]; then
            echo "No formula changes detected"
            echo "has_formula_changes=false" >> $GITHUB_OUTPUT
            echo "formulas=[]" >> $GITHUB_OUTPUT
          else
            JSON_ARRAY=$(echo "$FORMULAS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "Changed formulas: $JSON_ARRAY"
            echo "has_formula_changes=true" >> $GITHUB_OUTPUT
            echo "formulas=$JSON_ARRAY" >> $GITHUB_OUTPUT
          fi

  validate-formula:
    name: Validate Formula (${{ matrix.formula }})
    runs-on: macos-26
    needs: detect-changes
    if: needs.detect-changes.outputs.has_formula_changes == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.detect-changes.outputs.formulas) }}
    env:
      TAP_PATH: ${{ github.repository_owner }}/homebrew-tap
      FORMULA_PATH: ${{ github.repository_owner }}/homebrew-tap/${{ matrix.formula }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Tap this repository
        run: |
          ABS_TAP_PATH="$(brew --repository)/Library/Taps/${TAP_PATH}"
          mkdir -p "$ABS_TAP_PATH"
          cp -r . "$ABS_TAP_PATH"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.DOCKER_READ_APP_ID }}
          private-key: ${{ secrets.DOCKER_READ_APP_PRIVATE_KEY }}
          owner: docker
          repositories: |
            dash-releases

      - name: Validate formula
        uses: ./validate-formula
        with:
          formula-path: ${{ env.FORMULA_PATH }}
          tap-path: ${{ env.TAP_PATH }}
          github-token: ${{ steps.app-token.outputs.token }}
