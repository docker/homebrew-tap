name: Validate Formula
description: Run brew style, audit, install, and cleanup for a formula

inputs:
  formula-path:
    description: Full formula path (e.g. owner/homebrew-tap/formula-name)
    required: true
  tap-path:
    description: Tap path (e.g. owner/homebrew-tap)
    required: true
  cleanup:
    description: Whether to uninstall the formula and remove the tap after validation
    default: "true"
  github-token:
    description: GitHub token for private asset downloads
    required: false

runs:
  using: composite
  steps:
    - name: Run brew style
      shell: bash
      run: brew style "${{ inputs.formula-path }}"

    - name: Run brew audit
      shell: bash
      run: brew audit --strict "${{ inputs.formula-path }}"

    - name: Install formula
      shell: bash
      env:
        HOMEBREW_GH_TOKEN: ${{ inputs.github-token }}
      run: |
        brew install --verbose "${{ inputs.formula-path }}"

    - name: Cleanup
      if: always() && inputs.cleanup == 'true'
      shell: bash
      run: |
        brew uninstall "${{ inputs.formula-path }}" 2>/dev/null || true
        ABS_TAP_PATH="$(brew --repository)/Library/Taps/${{ inputs.tap-path }}"
        rm -rf "$ABS_TAP_PATH" || true
